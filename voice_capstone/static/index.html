<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgriAssist - Farm Voice Assistant</title>

<style>
:root{
--bg:#f6fbf2;
--panel:#ffffff;
--muted:#5f6f52;
--text:#1f2937;
--brand:#2f7a33;
--brand-soft:#e9f7e9;
--border:#d8e7d6;
--shadow:0 12px 28px rgba(31,41,55,0.08);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Inter,Segoe UI,Arial,sans-serif;
color:var(--text);
background:
radial-gradient(circle at 20% 10%,#e8f5e6,transparent 45%),
radial-gradient(circle at 90% 0%,#edf9ec,transparent 45%),
var(--bg);
min-height:100vh;
padding:24px;
}

.app{
max-width:980px;
margin:0 auto;
background:var(--panel);
border:1px solid var(--border);
border-radius:20px;
box-shadow:var(--shadow);
overflow:hidden;
}

.tabs{
display:grid;
grid-template-columns:1fr 1fr;
border-bottom:1px solid var(--border);
background:#f8fdf8;
}

.tab{
border:none;
background:transparent;
padding:14px;
font-weight:700;
cursor:pointer;
color:var(--muted);
}

.tab.active{
background:var(--brand-soft);
color:var(--brand);
border-bottom:3px solid var(--brand);
}

.header{
padding:22px;
border-bottom:1px solid var(--border);
background:linear-gradient(135deg,#ffffff 0%,#f3fbf2 100%);
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

h1{margin:0;font-size:28px;}

.subtitle{margin:8px 0 6px;color:var(--muted);}

.session{
margin-top:10px;
font-family:monospace;
font-size:12px;
}

.actions{display:flex;gap:8px;}

.btn{
border:1px solid var(--border);
border-radius:999px;
padding:8px 12px;
background:#fff;
cursor:pointer;
font-weight:600;
}

.btn.primary{
background:var(--brand);
border-color:var(--brand);
color:#fff;
}

.status{
display:inline-flex;
align-items:center;
gap:8px;
margin-left:8px;
padding:7px 11px;
border-radius:999px;
border:1px solid var(--border);
background:#f8fdf8;
font-size:12px;
font-weight:600;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#22c55e;
}

.view{display:none;padding:20px;}
.view.active{display:block;}

.messages{
border:1px solid var(--border);
border-radius:14px;
min-height:280px;
max-height:420px;
overflow-y:auto;
padding:12px;
background:#fcfffb;
}

.msg{margin:10px 0;display:flex;}
.msg.user{justify-content:flex-end;}

.bubble{
max-width:78%;
padding:10px 12px;
border-radius:14px;
line-height:1.4;
font-size:14px;
border:1px solid var(--border);
background:#fff;
}

.msg.user .bubble{
background:#edf8ed;
border-color:#c9e4c6;
}

.speaker{
margin-left:8px;
cursor:pointer;
opacity:.7;
}

.speaker:hover{opacity:1;}

.input{
display:grid;
grid-template-columns:52px 1fr auto;
gap:8px;
margin-top:12px;
}

.mic{
border:1px solid var(--border);
border-radius:12px;
background:#fff;
cursor:pointer;
font-size:20px;
}

.mic.recording{
background:#fee2e2;
border-color:#fecaca;
}

input[type=text]{
width:100%;
border:1px solid var(--border);
border-radius:12px;
padding:11px 12px;
font-size:14px;
}

.loading{display:none;margin-top:8px;font-size:13px;}
.loading.active{display:block;}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.modal.active{display:flex;}

.card{
width:min(900px,100%);
max-height:85vh;
overflow:auto;
background:#fff;
border-radius:14px;
border:1px solid var(--border);
padding:18px;
}
</style>
</head>

<body>

<div class="app">

<div class="tabs">
<button class="tab active" onclick="switchTab('intake')">AgriAssist Assessment</button>
<button class="tab" onclick="switchTab('consult')">Farm Consult</button>
</div>

<div class="header">
<div class="row">
<h1 id="title">AgriAssist</h1>

<div class="row">
<div class="actions">
<button class="btn" onclick="startSession()">New Session</button>
<button class="btn" onclick="viewSummaryReport()">Farm Report</button>
</div>

<div class="status">
<span class="dot"></span>
<span id="statusText">Ready</span>
</div>

</div>
</div>

<p class="subtitle">Voice-first crop issue intake and farm consultation.</p>
<p class="session" id="sessionIdDisplay">No active session</p>

</div>

<section id="view-intake" class="view active">

<div id="messages" class="messages"></div>

<div class="loading" id="loading">Processing...</div>

<div class="input">
<button class="mic" id="micBtn"
onmousedown="startRecording()"
onmouseup="stopRecording()">🎙️</button>

<input type="text" id="textInput" placeholder="Describe your crop issue...">

<button class="btn primary" onclick="sendText()">Send</button>
</div>

</section>

<section id="view-consult" class="view">

<div id="consultMessages" class="messages"></div>

<div class="loading" id="consultLoading">Processing...</div>

<div class="input">
<button class="mic"
onmousedown="startConsultRecording()"
onmouseup="stopConsultRecording()">🎙️</button>

<input type="text" id="consultInput" placeholder="Ask farm question...">

<button class="btn primary" onclick="sendConsult()">Ask</button>
</div>

</section>

</div>

<script>

let currentAudio=null;
let sessionId=null;
let mediaRecorder=null;
let audioChunks=[];
let isRecording=false;

const API_BASE=window.location.origin;

function apiUrl(path){
return API_BASE+path;
}

function switchTab(tab){

document.getElementById("view-intake").classList.toggle("active",tab==="intake");
document.getElementById("view-consult").classList.toggle("active",tab==="consult");

}

function addMessage(role,text,consult=false,audio=null){

const container=consult?
document.getElementById("consultMessages"):
document.getElementById("messages");

const msg=document.createElement("div");
msg.className="msg "+role;

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.textContent=text;

if(role==="assistant" && audio){

const speaker=document.createElement("span");
speaker.className="speaker";
speaker.innerHTML="🔊";

speaker.onclick=()=>{

if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}

currentAudio=new Audio("data:audio/mp3;base64,"+audio);
currentAudio.play();

};

bubble.appendChild(speaker);

}

msg.appendChild(bubble);
container.appendChild(msg);

container.scrollTop=container.scrollHeight;

}

async function startSession(){

const res=await fetch(apiUrl("/session/new"),{method:"POST"});
const data=await res.json();

sessionId=data.session_id;

document.getElementById("sessionIdDisplay").textContent=
"Active Session: "+sessionId;

}

async function sendText(){

const input=document.getElementById("textInput");
const text=input.value.trim();

if(!text)return;

addMessage("user",text);
input.value="";

const res=await fetch(apiUrl("/session/"+sessionId+"/text"),{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text})

});

const data=await res.json();

addMessage("assistant",data.response_text,false,data.audio_base64);

}

async function startRecording(){

const stream=await navigator.mediaDevices.getUserMedia({audio:true});

mediaRecorder=new MediaRecorder(stream);
audioChunks=[];

mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);

mediaRecorder.onstop=async()=>{

const blob=new Blob(audioChunks,{type:"audio/webm"});

const fd=new FormData();
fd.append("audio",blob);

const res=await fetch(apiUrl("/session/"+sessionId+"/voice"),{
method:"POST",
body:fd
});

const data=await res.json();

addMessage("assistant",data.response_text,false,data.audio_base64);

};

mediaRecorder.start();
isRecording=true;

}

function stopRecording(){

if(!isRecording)return;

mediaRecorder.stop();
isRecording=false;

}

async function sendConsult(){

const input=document.getElementById("consultInput");
const q=input.value.trim();

if(!q)return;

addMessage("user",q,true);
input.value="";

const res=await fetch(apiUrl("/consult"),{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question:q})

});

const data=await res.json();

addMessage("assistant",data.answer,true,data.audio_base64);

}

window.onload=()=>{

addMessage("assistant","Welcome to AgriAssist. Start a session to begin.");

addMessage(
"assistant",
"Hello! Ask farm questions here.",
true
);

}

</script>

</body>
</html>
